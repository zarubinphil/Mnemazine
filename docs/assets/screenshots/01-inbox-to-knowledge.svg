<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="72" y="72" width="1136" height="576" rx="28" fill="#fff" stroke="#e5e7eb"/>
  <text x="104" y="132" font-family="-apple-system,Segoe UI,sans-serif" font-size="42" font-weight="700" fill="#111827">Mnemazine: from raw input to memory</text>
  <g font-family="-apple-system,Segoe UI,sans-serif">
    <rect x="104" y="198" width="190" height="130" rx="14" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="128" y="246" font-size="24" font-weight="700" fill="#0039a6">Inbox</text>
    <text x="128" y="282" font-size="17" fill="#475467">screenshots, PDFs,</text>
    <text x="128" y="306" font-size="17" fill="#475467">links, transcripts</text>
    <path d="M304 263h92" stroke="#0039a6" stroke-width="5" stroke-linecap="round"/>
    <path d="M388 250l18 13-18 13" fill="none" stroke="#0039a6" stroke-width="5"/>
    <rect x="416" y="198" width="190" height="130" rx="14" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="440" y="246" font-size="24" font-weight="700" fill="#0039a6">Extract</text>
    <text x="440" y="282" font-size="17" fill="#475467">local OCR, parsers,</text>
    <text x="440" y="306" font-size="17" fill="#475467">hash cache</text>
    <path d="M616 263h92" stroke="#d52b1e" stroke-width="5" stroke-linecap="round"/>
    <path d="M700 250l18 13-18 13" fill="none" stroke="#d52b1e" stroke-width="5"/>
    <rect x="728" y="198" width="190" height="130" rx="14" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="752" y="246" font-size="24" font-weight="700" fill="#d52b1e">Verify</text>
    <text x="752" y="282" font-size="17" fill="#475467">sources, GitHub,</text>
    <text x="752" y="306" font-size="17" fill="#475467">official docs</text>
    <path d="M928 263h92" stroke="#0039a6" stroke-width="5" stroke-linecap="round"/>
    <path d="M1012 250l18 13-18 13" fill="none" stroke="#0039a6" stroke-width="5"/>
    <rect x="1040" y="198" width="120" height="130" rx="14" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="1064" y="246" font-size="24" font-weight="700" fill="#111827">Vault</text>
    <text x="1064" y="282" font-size="17" fill="#475467">final</text>
    <text x="1064" y="306" font-size="17" fill="#475467">notes</text>
    <rect x="162" y="420" width="956" height="96" rx="16" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="196" y="462" font-size="23" font-weight="700" fill="#111827">Rule</text>
    <text x="196" y="496" font-size="21" fill="#344054">Raw OCR never becomes memory until it is understood, checked, and rewritten.</text>
  </g>
</svg>
