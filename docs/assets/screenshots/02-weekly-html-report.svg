<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="160" fill="#fff"/>
  <rect x="0" y="160" width="1280" height="150" fill="#0039a6"/>
  <rect x="0" y="310" width="1280" height="110" fill="#d52b1e"/>
  <text x="72" y="118" font-family="-apple-system,Segoe UI,sans-serif" font-size="64" font-weight="800" fill="#111827">Mnemazine Weekly</text>
  <text x="76" y="230" font-family="-apple-system,Segoe UI,sans-serif" font-size="28" fill="#ffffff">Readable weekly memory, not a raw changelog</text>
  <g font-family="-apple-system,Segoe UI,sans-serif">
    <rect x="72" y="470" width="340" height="172" rx="12" fill="#fff" stroke="#e5e7eb"/>
    <text x="96" y="510" font-size="22" font-weight="700" fill="#111827">Local OCR before vision</text>
    <text x="96" y="548" font-size="17" fill="#475467">Cheaper extraction. Stable cache.</text>
    <rect x="96" y="590" width="82" height="34" rx="7" fill="#fff" stroke="#0039a6"/><text x="114" y="612" font-size="14" fill="#0039a6">Read</text>
    <rect x="190" y="590" width="82" height="34" rx="7" fill="#fff" stroke="#d52b1e"/><text x="208" y="612" font-size="14" fill="#d52b1e">Work</text>
    <rect x="284" y="590" width="82" height="34" rx="7" fill="#fff" stroke="#98a2b3"/><text x="302" y="612" font-size="14" fill="#475467">Forget</text>
    <rect x="470" y="470" width="340" height="172" rx="12" fill="#fff" stroke="#e5e7eb"/>
    <text x="494" y="510" font-size="22" font-weight="700" fill="#111827">Graph after ingest</text>
    <text x="494" y="548" font-size="17" fill="#475467">New notes become navigable context.</text>
    <rect x="494" y="590" width="82" height="34" rx="7" fill="#111827"/><text x="512" y="612" font-size="14" fill="#fff">Read</text>
    <rect x="868" y="470" width="340" height="172" rx="12" fill="#fff" stroke="#e5e7eb"/>
    <text x="892" y="510" font-size="22" font-weight="700" fill="#111827">Split long guides</text>
    <text x="892" y="548" font-size="17" fill="#475467">One source can become many notes.</text>
    <rect x="892" y="590" width="82" height="34" rx="7" fill="#fff" stroke="#0039a6"/><text x="910" y="612" font-size="14" fill="#0039a6">Read</text>
  </g>
</svg>
