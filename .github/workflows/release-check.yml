name: release-check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install npm dependencies
        run: npm ci
      - name: Ensure audit tools
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Show runtime versions
        run: |
          node --version
          npm --version
          python3 --version
          rg --version
      - name: Run post-run report smoke
        run: npm run postrun -- --run-id ci-postrun --since-days 30 --reports "$RUNNER_TEMP/mnemazine-postrun" --quiet
      - name: Run local security audit
        run: npm run audit:local
      - name: Run setup dry-run smoke
        run: printf '2\n2\n2\n' | MNEMAZINE_SETUP_DRYRUN=1 bash setup.sh
      - name: Run live preflight smoke
        run: MNEMAZINE_PREFLIGHT_ALLOW_EMPTY=1 MNEMAZINE_PREFLIGHT_SKIP_REMOTE=1 MNEMAZINE_PREFLIGHT_SKIP_LLM=1 npm run preflight:live
      - name: Run release test suite
        run: npm test
      - name: Run release gate directly
        run: npm run release-check
