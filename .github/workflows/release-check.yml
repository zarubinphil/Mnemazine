name: release-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Show runtime versions
        run: |
          node --version
          npm --version
          python3 --version
      - name: Run post-run report smoke
        run: npm run postrun -- --run-id ci-postrun --since-days 30 --reports "$RUNNER_TEMP/mnemazine-postrun" --quiet
      - name: Run release gate (syntax, demo smoke, public scan, bilingual README parity)
        run: npm run release-check
